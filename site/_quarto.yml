project:
  type: website
  output-dir: _site
  render:
    - "*.qmd"
    - "weeks/**/*.qmd"
    - "autopilot/**/*.qmd"
  resources:
    - CNAME

website:
  title: "ME 2801 — Introduction to Feedback Control"
  site-url: https://controls-intro.bbingham.dev
  repo-url: https://github.com/bsb808/introduction-to-feedback-control
  search: false
  navbar:
    pinned: true
    left:
      - href: index.qmd
        text: Home
      - href: syllabus.qmd
        text: Syllabus
      - href: schedule.qmd
        text: Schedule
      - href: assignments.qmd
        text: Assignments
      - href: autopilot/index.qmd
        text: Autopilot
    right:
      - icon: github
        href: https://github.com/bsb808/introduction-to-feedback-control
        aria-label: Source on GitHub
  page-footer:
    left: "© Brian Bingham · [Source on GitHub](https://github.com/bsb808/introduction-to-feedback-control)"
    right: "Built with [Quarto](https://quarto.org/)"

format:
  html:
    theme: cosmo
    toc: true
    html-math-method: mathjax
    link-external-newwindow: true
    link-external-icon: true
    grid:
      body-width: 1400px       # default 800; raise the cap so wide monitors are used
      margin-width: 200px
      sidebar-width: 200px
